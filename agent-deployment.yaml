apiVersion: v1
kind: ServiceAccount
metadata:
  name: owl-diagnostics-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: owl-diagnostics-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: owl-diagnostics-binding
subjects:
  - kind: ServiceAccount
    name: owl-diagnostics-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: owl-diagnostics-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: owl-diagnostics-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owl-agent
  template:
    metadata:
      labels:
        app: owl-agent
    spec:
      serviceAccountName: owl-diagnostics-sa
      containers:
      - name: watcher
        image: owl-diagnostics-agent:latest # Use 'eval $(minikube docker-env)' before building
        imagePullPolicy: Never # Critical for local Minikube testing
        env:
        - name: S3_ENDPOINT
          value: "http://s3mock:9090"
        - name: LLM_ENDPOINT
          value: "http://host.minikube.internal:11434/v1"
        - name: LLM_MODEL
          value: "llama3"