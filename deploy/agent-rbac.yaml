apiVersion: v1
kind: ServiceAccount
metadata:
  name: owl-diagnostics-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: owl-diagnostics-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: owl-diagnostics-binding
subjects:
  - kind: ServiceAccount
    name: owl-diagnostics-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: owl-diagnostics-role
  apiGroup: rbac.authorization.k8s.io